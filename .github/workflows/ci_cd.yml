name: CI/CD Workflow

on:
  push:
  workflow_dispatch:
    inputs:
      tag:
        description: "Give a tag that will be used for the docker image, then a deployment will be triggered."
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.x'

      - name: Restore & Build
        run: dotnet build src/Host/Host.csproj --configuration Release

      - name: Test
        run: make test

  deploy:
    needs: build
    if: >
      startsWith(github.ref, 'refs/heads/release/') ||
      startsWith(github.ref, 'refs/heads/hotfix/') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Extract Version from Branch or Tag Name
        run: |
          if [ -z "${{ github.event.inputs.tag }}" ]; then
            REF_NAME=${GITHUB_REF#refs/*/}
            VERSION=${REF_NAME#*/}
          else
            VERSION=${{ github.event.inputs.tag }}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Build and Push
        uses: docker/build-push-action@v5
        with:
          file: src/Host/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/webapi:${{ env.VERSION }}