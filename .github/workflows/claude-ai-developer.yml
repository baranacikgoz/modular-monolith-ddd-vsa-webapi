name: 🤖 Claude AI Developer

on:
  issues:
    types: [labeled]

jobs:
  ai-developer-task:
    # Trigger ONLY when the specific label is applied
    if: github.event.label.name == 'claude-ai'
    name: Execute Autonomous Claude Agent
    runs-on: arc-runners
    
    # Required for Claude to use the `gh` cli inside the container
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 💬 Contextualize Task
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_BODY=$(gh issue view ${{ github.event.issue.number }} --json body -q .body)
          ISSUE_TITLE=$(gh issue view ${{ github.event.issue.number }} --json title -q .title)
          
          echo "ISSUE_BODY<<EOF" >> $GITHUB_ENV
          echo "$ISSUE_BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          echo "ISSUE_TITLE<<EOF" >> $GITHUB_ENV
          echo "$ISSUE_TITLE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 🧠 Unleash Claude Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_INTERACTIVE: "false"
        run: |
          echo "Executing autonomous task for Issue #${{ github.event.issue.number }}..."
          
          # One master prompt giving Claude complete control of the lifecycle
          claude --dangerously-skip-permissions -p "You are an autonomous AI Developer tasked with resolving GitHub Issue #${{ github.event.issue.number }}: '$ISSUE_TITLE'. 
          
          Issue Details:
          $ISSUE_BODY
          
          Instructions:
          1. Strictly adhere to rules defined in CLAUDE.md.
          2. Implement your changes. Do not forget to verify.
          3. Once confident, create a new branch named 'claude-fix/issue-${{ github.event.issue.number }}'.
          4. Commit your changes and push the branch to origin.
          5. Use the 'gh' CLI to create a Pull Request against the main branch.
          6. The PR description MUST include:
             - 'Fixes #${{ github.event.issue.number }}'
             - A 'Decisions & Rationale' section explaining exactly WHY you chose this implementation over alternatives for this $ISSUE_TITLE.
          
          You have full autonomy to use bash, git, and standard tooling to complete this. Do not stop until the Pull Request is confirmed created."