name: Scaffold Tests
description: Create failing slice tests prior to implementation
title: "Scaffold Tests: [Feature Name]"
body:
  - type: markdown
    attributes:
      value: "Reminder: Please set a `claude-ai-dotnet-[tier]` label before submitting so the AI picks this up!"
  - type: textarea
    id: instructions
    attributes:
      label: AI Agent Instructions
      description: "⚠️ DO NOT MODIFY these instructions."
      value: |
        ## AI Agent Instructions
        Expert .NET Engineer (DDD/VSA). Execute: `/scaffold-tests`

        ### Rules:
        1. Branch: `claude-ai-dotnet/issue-<ISSUE_NUMBER>`
        2. PR: `Fixes #<ISSUE_NUMBER>`
        3. Output: Your ONLY communication is the PR description.
        4. Failure: Open PR with current state & report root cause. Do NOT loop.
        5. Standards: Follow `01-instructions.md` & `CLAUDE.md`.

        ### Test Scaffolding Report (Output in PR Description):
        - Test Scenarios Summary
        - Verification Results (Tests Run)
        - Decisions & Rationale (explaining architectural choices)

        ⚠️ NOTE: Only write the failing tests. Do not implement the actual logic yet.
  - type: textarea
    id: requirements
    attributes:
      label: Test Scenarios
      description: "Describe the test scenarios."
      value: |
        ## Test Scenarios
        [Write integration tests for creating a product with valid and invalid pricing...]

