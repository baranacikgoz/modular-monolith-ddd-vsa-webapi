name: Scaffold Tests
description: Create failing slice tests prior to implementation
title: "Scaffold Tests: [Feature Name]"
body:
  - type: textarea
    id: ai_instructions
    attributes:
      label: AI Agent Instructions
      description: "⚠️ DO NOT MODIFY: These are the core instructions for the AI Agent."
      value: |
        ## AI Agent Instructions
        > **⚠️ IMPORTANT:** Only write the failing tests. Do not implement the actual logic yet.

        Execute the following workflow:
        `/scaffold-tests` (contained in `.agent/workflows/scaffold-tests.md`)
    validations:
      required: true
  - type: markdown
    attributes:
      value: "Reminder: Please set a `claude-ai-dotnet-[tier]` label before submitting so the AI picks this up!"
  - type: textarea
    id: requirements
    attributes:
      label: Test Scenarios
      description: Describe the scenarios and assertions needed for the test suite.
      placeholder: Write integration tests for creating a product with valid and invalid pricing...
    validations:
      required: true
