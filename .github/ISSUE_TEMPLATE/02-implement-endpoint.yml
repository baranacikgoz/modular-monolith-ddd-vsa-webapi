name: Implement Endpoint
description: Write code to implement an endpoint utilizing the REPR pattern
title: "Implement Endpoint: [Endpoint Name]"
body:
  - type: markdown
    attributes:
      value: "Reminder: Please set a `claude-ai-dotnet-[tier]` label before submitting so the AI picks this up!"
  - type: textarea
    id: instructions
    attributes:
      label: AI Agent Instructions
      description: "⚠️ DO NOT MODIFY these instructions."
      value: |
        Expert .NET Engineer (DDD/VSA). Execute: `/implement-endpoint`, `/verify-feature`

        ### Rules:
        1. Branch: `claude-ai-dotnet/issue-<ISSUE_NUMBER>`
        2. PR: `Fixes #<ISSUE_NUMBER>`
        3. Output: Your ONLY communication is the PR description.
        4. Failure: Open PR with current state & report root cause. Do NOT loop.
        5. Standards: Follow `01-instructions.md` & `CLAUDE.md`.

        ### Implementation Report (Output in PR Description):
        - Implementation Summary
        - Verification Results (Tests Run)
        - Decisions & Rationale (explaining architectural choices)
  - type: textarea
    id: requirements
    attributes:
      label: Implementation Requirements
      description: "Describe the implementation details."
      value: |
        [Provide the technical details or reference the plan from Issue #...]

