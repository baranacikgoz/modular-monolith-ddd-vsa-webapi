name: 🏗️ Plan Refactor
description: Plan a codebase refactoring without writing code
title: "Plan Refactor: [Refactor Target]"
body:
  - type: markdown
    attributes:
      value: |
        ## AI Agent Instructions
        > **⚠️ IMPORTANT:** This issue is for **PLANNING ONLY**. Do NOT write code.

        Execute the following workflow:
        `/plan-refactor` (contained in `.agent/workflows/plan-refactor.md`)
  - type: markdown
    attributes:
      value: |
        *Reminder: Please set a `claude-ai-dotnet-[tier]` label before submitting so the AI picks this up!*
  - type: textarea
    id: details
    attributes:
      label: Refactoring Details
      description: Explain the current codebase issues and what needs to be refactored.
      placeholder: Describe the technical debt, bottlenecks, or architectural violations...
    validations:
      required: true
