name: Verify Feature
description: Run the quality gate and verify feature correctness
title: "Verify Feature: [Feature Name]"
body:
  - type: markdown
    attributes:
      value: "Reminder: Please set a `claude-ai-dotnet-[tier]` label before submitting so the AI picks this up!"
  - type: textarea
    id: instructions
    attributes:
      label: AI Agent Instructions
      description: "⚠️ DO NOT MODIFY these instructions."
      value: |
        Expert .NET Engineer (DDD/VSA). Execute: `.agent/workflows/verify-feature.md`

        ### Rules:
        1. Branch: `claude-ai-dotnet/issue-<ISSUE_NUMBER>`
        2. PR: `Fixes #<ISSUE_NUMBER>`
        3. Output: Your ONLY communication is the PR description.
        4. Failure: Open PR with current state & report root cause. Do NOT loop.
        5. Standards: Follow `01-instructions.md` & `CLAUDE.md`.

        ### Verification Report (Output in PR Description):
        - Test Suite Results
        - Architectural Compliance Check
        - Performance & Mapping Audit
  - type: textarea
    id: details
    attributes:
      label: Verification Details
      description: "Specify which module or feature needs verification."
      value: |
        [Specify the target module or feature to verify...]
