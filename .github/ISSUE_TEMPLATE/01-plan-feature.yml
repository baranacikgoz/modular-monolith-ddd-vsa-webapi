name: Plan Feature
description: Plan a new architectural feature without writing code
title: "Plan Feature: [Feature Name]"
body:
  - type: markdown
    attributes:
      value: "Reminder: Please set a `claude-ai-dotnet-[tier]` label before submitting so the AI picks this up!"
  - type: textarea
    id: instructions
    attributes:
      label: AI Agent Instructions
      description: "⚠️ DO NOT MODIFY these instructions."
      value: |
        ## AI Agent Instructions
        Expert .NET Engineer (DDD/VSA). Execute: `/plan-feature`

        ### Rules:
        1. Branch: `claude-ai-dotnet/issue-<ISSUE_NUMBER>`
        2. PR: `Fixes #<ISSUE_NUMBER>`
        3. Output: Your ONLY communication is the PR description.
        4. Failure: Open PR with current state & report root cause. Do NOT loop.
        5. Standards: Follow `01-instructions.md` & `CLAUDE.md`.

        ### Planning Report (Output in PR Description):
        - Detailed Architectural Plan
        - Decisions & Rationale (explaining architectural choices)

        ⚠️ NOTE: This issue is for PLANNING ONLY. Do NOT write code.
  - type: textarea
    id: requirements
    attributes:
      label: Feature Requirements
      description: "Describe the behavior, domain logic, and specifications of the new feature."
      value: |
        ## Feature Requirements
        [Describe the behavior, domain logic, and specifications of the new feature...]

