name: 🗺️ Plan Feature
description: Plan a new architectural feature without writing code
title: "Plan Feature: [Feature Name]"
body:
  - type: textarea
    id: ai_instructions
    attributes:
      label: 🤖 AI Agent: Command & Instructions
      description: "⚠️ DO NOT MODIFY: These are the core instructions for the AI Agent."
      value: |
        ## AI Agent Instructions
        > **⚠️ IMPORTANT:** This issue is for **PLANNING ONLY**. Do NOT write code.

        Execute the following workflow:
        `/plan-feature` (contained in `.agent/workflows/plan-feature.md`)
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        *Reminder: Please set a `claude-ai-dotnet-[tier]` label before submitting so the AI picks this up!*
  - type: textarea
    id: requirements
    attributes:
      label: Feature Requirements
      description: Explain the behavior, domain logic, and specifications of the new feature.
      placeholder: Describe the desired feature architecture...
    validations:
      required: true
