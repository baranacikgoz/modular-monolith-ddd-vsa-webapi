name: 🛠️ Execute Refactor
description: Execute a planned refactoring
title: "Execute Refactor: [Refactor Target]"
body:
  - type: textarea
    id: ai_instructions
    attributes:
      label: 🤖 AI Agent: Command & Instructions
      description: "⚠️ DO NOT MODIFY: These are the core instructions for the AI Agent."
      value: |
        ## AI Agent Instructions

        Execute the following workflows:
        1. `/execute-refactor` (contained in `.agent/workflows/execute-refactor.md`)
        2. `/verify-feature` (contained in `.agent/workflows/verify-feature.md`)
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        *Reminder: Please set a `claude-ai-dotnet-[tier]` label before submitting so the AI picks this up!*
  - type: textarea
    id: details
    attributes:
      label: Refactoring Plan
      description: Provide the details, previous plan, or instructions for the implementation.
      placeholder: Based on the plan from Issue #..., please implement the following refactoring...
    validations:
      required: true
