name: Execute Refactor
description: Execute a planned refactoring
title: "Execute Refactor: [Refactor Target]"
body:
  - type: markdown
    attributes:
      value: "Reminder: Please set a `claude-ai-dotnet-[tier]` label before submitting so the AI picks this up!"
  - type: textarea
    id: instructions
    attributes:
      label: AI Agent Instructions
      description: "⚠️ DO NOT MODIFY these instructions."
      value: |
        Expert .NET Engineer (DDD/VSA). Execute: `/execute-refactor`, `/verify-feature`

        ### Rules:
        1. Branch: `claude-ai-dotnet/issue-<ISSUE_NUMBER>`
        2. PR: `Fixes #<ISSUE_NUMBER>`
        3. Output: Your ONLY communication is the PR description.
        4. Failure: Open PR with current state & report root cause. Do NOT loop.
        5. Standards: Follow `01-instructions.md` & `CLAUDE.md`.

        ### Refactoring Report (Output in PR Description):
        - Refactoring Summary
        - Verification Results (Tests Run)
        - Decisions & Rationale (explaining architectural choices)

        ⚠️ NOTE: Implement this refactor by directly modifying the code and validating it with tests.
  - type: textarea
    id: requirements
    attributes:
      label: Refactoring Plan
      description: "Describe the refactoring plan."
      value: |
        [Based on the plan from Issue #..., please implement the following refactoring...]

