global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["mm.prometheus:9090"]

  - job_name: "otel-collector"
    static_configs:
      - targets: ["mm.otel-collector:9464"]

  - job_name: "postgres"
    static_configs:
      - targets: ["mm.postgres-exporter:9187"]
