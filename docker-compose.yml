name: mm-local-development

services:
  host:
    container_name: mm.host
    image: ${DOCKER_REGISTRY-}host
    restart: "no"
    build:
      context: .
      dockerfile: src/Host/Host/Dockerfile
    networks:
      - local_shared_network
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      # Config files are excluded from the published image (CopyToPublishDirectory=Never).
      # Local dev materializes them by mounting the committed placeholders read-only into the
      # path the app reads (ContentRoot=/app -> /app/Configurations). In real environments a
      # sidecar / secret volume mounts the same path with materialized values. Secret-bearing
      # values (DB, RabbitMQ, caching) are overridden below via env vars, which win over JSON.
      - ./src/Host/Host/Configurations:/app/Configurations:ro
    depends_on:
      mm.postgres:
        condition: service_healthy
      mm.rabbitmq:
        condition: service_healthy
      mm.aspire-dashboard:
        condition: service_started
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5001
      - DatabaseOptions__ConnectionString=Server=mm.postgres;Port=5432;Database=modular-monolith-db;User Id=postgres;Password=postgres;Include Error Detail=true
      - ObservabilityOptions__AppVersion=1.0.0
      - ObservabilityOptions__LogGeneratedSqlQueries=true
      - ObservabilityOptions__LogSink=Otlp
      - ObservabilityOptions__SeqServerUrl=http://mm.seq:5341
      - ObservabilityOptions__EnableMetrics=true
      - ObservabilityOptions__EnableTracing=true
      - ObservabilityOptions__OtlpEndpoint=http://mm.aspire-dashboard:18889
      - ObservabilityOptions__OtlpProtocol=Grpc
      - CachingOptions__UseRedis=false
      - CachingOptions__Redis__Host=mm.redis
      - CachingOptions__Redis__Port=6379
      - CachingOptions__Redis__Password=admin
      - CachingOptions__Redis__AppName=modular-monolith-
      - OutboxOptions__PollIntervalMs=500
      - OutboxOptions__BatchSize=50
      - OutboxOptions__MaxRetryCount=5
      - RabbitMqOptions__Host=mm.rabbitmq
      - RabbitMqOptions__Port=5672
      - RabbitMqOptions__Username=guest
      - RabbitMqOptions__Password=guest
    healthcheck:
      test: [ "CMD-SHELL", "curl -f -s -o /dev/null http://localhost:5001/health/live || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  mm.postgres:
    container_name: mm.postgres
    image: postgres:latest
    restart: "no"
    volumes:
      - ./.containers/mm.postgres:/var/lib/postgresql/data
    networks:
      - local_shared_network
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mm.rabbitmq:
    container_name: mm.rabbitmq
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    volumes:
      - ./.containers/mm.rabbitmq:/var/lib/rabbitmq
    networks:
      - local_shared_network
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mm.redis:
    image: redis/redis-stack:latest
    container_name: mm.redis
    restart: "no"
    volumes:
      - ./.containers/mm.redis:/data
    networks:
      - local_shared_network
    ports:
      - "127.0.0.1:6379:6379"
      - "127.0.0.1:8001:8001"
    environment:
      - REDIS_PASSWORD=admin
    command: redis-server --requirepass admin

  mm.aspire-dashboard:
    container_name: mm.aspire-dashboard
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    restart: "no"
    networks:
      - local_shared_network
    ports:
      - "127.0.0.1:18888:18888" # Dashboard UI
      - "127.0.0.1:18889:18889" # OTLP gRPC
      - "127.0.0.1:18890:18890" # OTLP HTTP
    environment:
      - DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS=true

networks:
  local_shared_network:
    external: true
