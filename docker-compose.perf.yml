name: mm-perf

# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.perf.yml up --abort-on-container-exit k6
#
# The full stack (host, postgres, rabbitmq, aspire-dashboard) comes from docker-compose.yml.
# This file only adds the k6 load generator.
#
# While the test runs, open the Aspire dashboard at http://localhost:18888 to watch
# OTel traces, spans, and metrics in real time — no extra wiring needed.

services:

  # Override mm.host rate limits so k6 traffic is not throttled.
  # Global limiter is per-IP (all k6 VUs share one container IP).
  # Named policies (Sms, Register, CreateStore) are global counters — 1/15s or 1/week kills the test.
  host:
    environment:
      - CustomRateLimitingOptions__Global__Limit=100000
      - CustomRateLimitingOptions__Global__PeriodInMs=1000
      - CustomRateLimitingOptions__Sms__Limit=100000
      - CustomRateLimitingOptions__Sms__PeriodInMs=1000
      - CustomRateLimitingOptions__Register__Limit=100000
      - CustomRateLimitingOptions__Register__PeriodInMs=1000
      - CustomRateLimitingOptions__CreateStore__Limit=100000
      - CustomRateLimitingOptions__CreateStore__PeriodInMs=1000
      - CustomRateLimitingOptions__TokenCreate__Limit=100000
      - CustomRateLimitingOptions__TokenCreate__PeriodInMs=1000
      - CustomRateLimitingOptions__CheckRegistration__Limit=100000
      - CustomRateLimitingOptions__CheckRegistration__PeriodInMs=1000
      - CustomRateLimitingOptions__TokenRefresh__Limit=100000
      - CustomRateLimitingOptions__TokenRefresh__PeriodInMs=1000

  k6:
    image: grafana/k6:latest
    container_name: mm.k6
    networks:
      - local_shared_network
    volumes:
      - ./k6:/scripts
    command: run /scripts/main.js
    depends_on:
      host:
        condition: service_healthy
    environment:
      - BASE_URL=http://mm.host:5001

networks:
  local_shared_network:
    external: true
